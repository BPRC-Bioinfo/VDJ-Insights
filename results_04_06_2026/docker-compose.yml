version: '3.8'

services:
  rabbit_ig:
    build: .
    ports:
      - "5004:5004"
    working_dir: /app/rabbit_ig_results
    command: gunicorn --chdir /app/rabbit_ig_results/flask --bind 0.0.0.0:5004 app:app

  rabbit_tr:
    build: .
    ports:
      - "5005:5005"
    working_dir: /app/rabbit_tr_results
    command: gunicorn --chdir flask --bind 0.0.0.0:5005 app:app